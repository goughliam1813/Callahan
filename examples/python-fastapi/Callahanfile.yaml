name: Python FastAPI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: ml-service

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Format check
        run: black --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - "5432:5432"
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
        run: |
          pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: AI Test Analysis
        ai:
          action: analyze_tests
          model: default
          prompt: "Analyze test coverage gaps and suggest missing test cases"

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Safety check (CVE scan)
        run: |
          pip install safety
          safety check -r requirements.txt --json > safety-report.json || true

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true

      - name: AI vulnerability triage
        ai:
          action: triage
          model: default
          prompt: "Triage the security findings: explain severity, false positives, and prioritized fixes"

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
            -t ${{ env.APP_NAME }}:${{ github.sha }} \
            .

      - name: Trivy container scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ env.APP_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          railway up --service=${{ env.APP_NAME }}

      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ env.APP_NAME }}.up.railway.app/health
